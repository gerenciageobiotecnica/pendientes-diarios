<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Pendientes Diarios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #eef0f7;
  --muted: #7a7f9a;
  --accent: #4f7cff;
  --accent-soft: rgba(79,124,255,0.12);
  --green: #32d583;
  --green-soft: rgba(50,213,131,0.12);
  --amber: #ffb547;
  --amber-soft: rgba(255,181,71,0.12);
  --red: #ff6b6b;
  --red-soft: rgba(255,107,107,0.12);
  --purple: #b57bee;
  --purple-soft: rgba(181,123,238,0.12);
  --teal: #38d9c0;
  --teal-soft: rgba(56,217,192,0.12);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

/* Header */
.header {
  padding: 20px 20px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(12px);
}
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.app-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.date-chip {
  font-size: 11px; font-family: var(--mono); color: var(--muted);
  background: var(--surface); border: 1px solid var(--border2);
  padding: 4px 10px; border-radius: 20px;
}
.stats-row { display: flex; gap: 8px; }
.stat {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 10px; text-align: center;
}
.stat-n { font-size: 18px; font-weight: 600; line-height: 1; }
.stat-l { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .04em; }

/* Tabs */
.tabs { display: flex; padding: 10px 20px; gap: 6px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 87px; z-index: 9; }
.tab {
  font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 16px 20px 120px; }

/* Add form */
.add-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; padding: 14px; margin-bottom: 20px;
}
.add-card-title { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
.field { margin-bottom: 10px; }
.field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; }
.field select, .field textarea, .field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 9px; color: var(--text); font-family: var(--font);
  font-size: 14px; padding: 9px 12px; appearance: none;
}
.field select:focus, .field textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.field textarea { resize: none; height: 64px; line-height: 1.5; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-agregar {
  width: 100%; background: var(--accent); color: #fff; border: none;
  border-radius: 10px; padding: 11px; font-family: var(--font);
  font-size: 14px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity .15s;
}
.btn-agregar:active { opacity: .8; }

/* Area group */
.area-group { margin-bottom: 14px; }
.area-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  cursor: pointer; margin-bottom: 1px;
  transition: border-color .15s;
}
.area-header:active { background: var(--surface2); }
.area-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.area-label { font-size: 13px; font-weight: 500; flex: 1; }
.area-badges { display: flex; gap: 5px; align-items: center; }
.badge-count {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 6px; font-family: var(--mono);
}
.chevron { font-size: 12px; color: var(--muted); transition: transform .2s; }
.chevron.open { transform: rotate(90deg); }

.items-list {
  border-left: 2px solid var(--border); margin-left: 16px;
  padding-left: 12px; padding-top: 4px;
  overflow: hidden;
  transition: max-height .25s ease;
}

.item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 10px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 5px; transition: opacity .2s;
}
.item.done { opacity: .45; }
.item-cb { margin-top: 2px; width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--green); cursor: pointer; }
.item-body { flex: 1; min-width: 0; }
.item-desc { font-size: 13px; line-height: 1.45; word-break: break-word; }
.item-desc.done { text-decoration: line-through; color: var(--muted); }
.item-meta { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }
.prio-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 5px; flex-shrink: 0; margin-top: 2px;
  text-transform: uppercase; letter-spacing: .04em;
}
.prio-alta { background: var(--red-soft); color: var(--red); }
.prio-media { background: var(--amber-soft); color: var(--amber); }
.prio-baja { background: var(--green-soft); color: var(--green); }
.item-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0; line-height: 1; flex-shrink: 0; }
.item-del:active { color: var(--red); }
.empty-area { font-size: 12px; color: var(--muted); padding: 8px 4px; text-align: center; font-style: italic; }

/* Report view */
.report-view { display: none; }
.report-view.active { display: block; }
.list-view { display: block; }
.list-view.hidden { display: none; }

.report-header-block {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; padding: 14px; margin-bottom: 16px;
  text-align: center;
}
.report-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.report-date { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.report-area-block { margin-bottom: 12px; }
.report-area-name {
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  font-weight: 600; padding: 6px 10px; border-radius: 8px;
  margin-bottom: 6px; border-left: 3px solid;
}
.report-item-row {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; padding: 6px 8px; border-bottom: 1px solid var(--border);
}
.report-item-row:last-child { border: none; }
.report-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
.report-text { flex: 1; line-height: 1.4; }
.report-time { font-size: 10px; color: var(--muted); font-family: var(--mono); white-space: nowrap; margin-top: 2px; }
.done-summary { font-size: 12px; color: var(--green); padding: 6px 8px; font-style: italic; }

/* FAB */
.fab-row {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; z-index: 20;
  width: calc(100% - 40px); max-width: 440px;
}
.fab {
  flex: 1; background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; padding: 13px; font-family: var(--font);
  font-size: 13px; font-weight: 500; color: var(--text);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  transition: all .15s;
}
.fab:active { transform: scale(0.97); }
.fab.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.fab.danger-soft { color: var(--red); border-color: rgba(255,107,107,.3); }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-size: 13px; padding: 9px 18px;
  border-radius: 10px; z-index: 50; opacity: 0;
  transition: opacity .2s; pointer-events: none; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="app-title">📋 Mis Pendientes</div>
    <div class="date-chip" id="fecha-chip"></div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="st-alta" style="color:var(--red)">0</div><div class="stat-l">Urgentes</div></div>
    <div class="stat"><div class="stat-n" id="st-pend" style="color:var(--amber)">0</div><div class="stat-l">Pendientes</div></div>
    <div class="stat"><div class="stat-n" id="st-done" style="color:var(--green)">0</div><div class="stat-l">Listos</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('agregar')">+ Agregar</button>
  <button class="tab" onclick="setTab('pendientes')">Por área</button>
  <button class="tab" onclick="setTab('reporte')">Reporte reunión</button>
</div>

<div class="content">

  <!-- Tab: agregar -->
  <div id="tab-agregar" class="list-view">
    <div class="add-card">
      <div class="add-card-title">Nuevo pendiente</div>
      <div class="row2">
        <div class="field">
          <label>Área</label>
          <select id="sel-area"></select>
        </div>
        <div class="field">
          <label>Prioridad</label>
          <select id="sel-prio">
            <option value="alta">🔴 Alta</option>
            <option value="media" selected>🟡 Media</option>
            <option value="baja">🟢 Baja</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Descripción</label>
        <textarea id="inp-desc" placeholder="Ej: Confirmar entrega con proveedor X..."></textarea>
      </div>
      <button class="btn-agregar" onclick="addItem()">
        <span style="font-size:18px;line-height:1">+</span> Agregar pendiente
      </button>
    </div>

    <!-- recent items shortcut -->
    <div id="recientes-label" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px">Últimos agregados</div>
    <div id="recientes-list"></div>
  </div>

  <!-- Tab: pendientes por área -->
  <div id="tab-pendientes" class="list-view hidden">
    <div id="areas-container"></div>
  </div>

  <!-- Tab: reporte -->
  <div id="tab-reporte" class="list-view hidden report-view">
    <div class="report-header-block">
      <div class="report-title">📋 Reporte — Reunión diaria</div>
      <div class="report-date" id="report-date-label"></div>
    </div>
    <div id="report-body"></div>
    <div style="height:16px"></div>
  </div>

</div>

<div class="fab-row" id="fab-row">
  <button class="fab danger-soft" onclick="clearDone()" id="fab-clear">🗑 Limpiar resueltos</button>
  <button class="fab primary" onclick="copyReport()" id="fab-copy">📋 Copiar reporte</button>
</div>

<div class="toast" id="toast"></div>

<script>
const AREAS=[
  {id:'ops',name:'Operaciones',color:'#4f7cff',bg:'rgba(79,124,255,0.1)'},
  {id:'adm',name:'Administración',color:'#b57bee',bg:'rgba(181,123,238,0.1)'},
  {id:'com',name:'Comercial',color:'#32d583',bg:'rgba(50,213,131,0.1)'},
  {id:'log',name:'Logística',color:'#ffb547',bg:'rgba(255,181,71,0.1)'},
  {id:'rrhh',name:'RRHH',color:'#ff6b6b',bg:'rgba(255,107,107,0.1)'},
  {id:'tec',name:'Tecnología',color:'#38d9c0',bg:'rgba(56,217,192,0.1)'},
];

let items=[];
let collapsed={};
let currentTab='agregar';
const TODAY_KEY='pend_day';

function getToday(){
  return new Date().toISOString().split('T')[0];
}

function save(){
  try{
    localStorage.setItem('pend_items_v2',JSON.stringify(items));
    localStorage.setItem(TODAY_KEY,getToday());
  }catch(e){}
}

function load(){
  try{
    const savedDay=localStorage.getItem(TODAY_KEY);
    const savedItems=localStorage.getItem('pend_items_v2');
    if(savedItems) items=JSON.parse(savedItems);
    // Don't auto-clear; let user decide
  }catch(e){}
}

function getHora(){
  return new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
}

function addItem(){
  const area=document.getElementById('sel-area').value;
  const prio=document.getElementById('sel-prio').value;
  const desc=document.getElementById('inp-desc').value.trim();
  if(!desc){showToast('Escribe una descripción');return;}
  items.unshift({id:Date.now(),area,prio,desc,done:false,hora:getHora(),fecha:getToday()});
  document.getElementById('inp-desc').value='';
  save();
  render();
  showToast('✓ Pendiente agregado');
}

function toggleDone(id){
  const it=items.find(i=>i.id===id);
  if(it){it.done=!it.done;}
  save();render();
}

function deleteItem(id){
  items=items.filter(i=>i.id!==id);
  save();render();
}

function clearDone(){
  const cnt=items.filter(i=>i.done).length;
  if(!cnt){showToast('No hay resueltos');return;}
  items=items.filter(i=>!i.done);
  save();render();
  showToast('✓ Resueltos eliminados');
}

function setTab(t){
  currentTab=t;
  ['agregar','pendientes','reporte'].forEach(id=>{
    const el=document.getElementById('tab-'+id);
    el.classList.toggle('hidden',id!==t);
  });
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',['agregar','pendientes','reporte'][i]===t);
  });
  render();
}

function escHtml(t){
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(){
  // Stats
  const pend=items.filter(i=>!i.done).length;
  const done=items.filter(i=>i.done).length;
  const alta=items.filter(i=>i.prio==='alta'&&!i.done).length;
  document.getElementById('st-total').textContent=items.length;
  document.getElementById('st-alta').textContent=alta;
  document.getElementById('st-pend').textContent=pend;
  document.getElementById('st-done').textContent=done;

  // Populate area select
  const sel=document.getElementById('sel-area');
  const prev=sel.value;
  sel.innerHTML=AREAS.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  if(prev)sel.value=prev;

  // Recientes
  renderRecientes();
  // Areas
  if(currentTab==='pendientes') renderAreas();
  // Reporte
  if(currentTab==='reporte') renderReporte();
}

function renderRecientes(){
  const list=document.getElementById('recientes-list');
  const label=document.getElementById('recientes-label');
  const recent=items.slice(0,5);
  if(!recent.length){
    label.style.display='none';
    list.innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px 0">Sin pendientes hoy. ¡Agrega el primero!</div>';
    return;
  }
  label.style.display='block';
  list.innerHTML=recent.map(it=>{
    const a=AREAS.find(x=>x.id===it.area)||AREAS[0];
    return `<div class="item${it.done?' done':''}">
      <input type="checkbox" class="item-cb" ${it.done?'checked':''} onchange="toggleDone(${it.id})">
      <div class="item-body">
        <div class="item-desc${it.done?' done':''}">${escHtml(it.desc)}</div>
        <div class="item-meta" style="color:${a.color}">${a.name} · ${it.hora}</div>
      </div>
      <span class="prio-badge prio-${it.prio}">${it.prio}</span>
      <button class="item-del" onclick="deleteItem(${it.id})">×</button>
    </div>`;
  }).join('');
}

function renderAreas(){
  const cont=document.getElementById('areas-container');
  let html='';
  AREAS.forEach(a=>{
    const its=items.filter(i=>i.area===a.id);
    const pendCnt=its.filter(i=>!i.done).length;
    const isColl=collapsed[a.id];
    const sorted=[...its].sort((x,y)=>{
      if(x.done!==y.done)return x.done?1:-1;
      const p={alta:0,media:1,baja:2};return p[x.prio]-p[y.prio];
    });
    html+=`<div class="area-group">
      <div class="area-header" onclick="toggleArea('${a.id}')">
        <span class="area-dot" style="background:${a.color}"></span>
        <span class="area-label">${a.name}</span>
        <div class="area-badges">
          ${pendCnt?`<span class="badge-count" style="background:${a.bg};color:${a.color}">${pendCnt}</span>`:''}
        </div>
        <span class="chevron${isColl?'':' open'}">▶</span>
      </div>`;
    if(!isColl){
      html+=`<div class="items-list">`;
      if(!its.length){
        html+=`<div class="empty-area">Sin pendientes en esta área</div>`;
      } else {
        sorted.forEach(it=>{
          html+=`<div class="item${it.done?' done':''}">
            <input type="checkbox" class="item-cb" ${it.done?'checked':''} onchange="toggleDone(${it.id})">
            <div class="item-body">
              <div class="item-desc${it.done?' done':''}">${escHtml(it.desc)}</div>
              <div class="item-meta">${it.hora}</div>
            </div>
            <span class="prio-badge prio-${it.prio}">${it.prio}</span>
            <button class="item-del" onclick="deleteItem(${it.id})">×</button>
          </div>`;
        });
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  cont.innerHTML=html;
}

function toggleArea(id){
  collapsed[id]=!collapsed[id];
  render();
}

function renderReporte(){
  const body=document.getElementById('report-body');
  const today=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('report-date-label').textContent=today;

  let html='';
  let anyContent=false;
  AREAS.forEach(a=>{
    const its=items.filter(i=>i.area===a.id);
    if(!its.length)return;
    anyContent=true;
    const pend=its.filter(i=>!i.done);
    const done=its.filter(i=>i.done);
    const sorted=[...pend].sort((x,y)=>{const p={alta:0,media:1,baja:2};return p[x.prio]-p[y.prio];});
    html+=`<div class="report-area-block">
      <div class="report-area-name" style="background:${a.bg};color:${a.color};border-color:${a.color}">
        ${a.name} — ${pend.length} pendiente${pend.length!==1?'s':''}
      </div>`;
    if(!sorted.length){
      html+=`<div style="font-size:12px;color:var(--muted);padding:6px 8px;font-style:italic">Todo resuelto ✓</div>`;
    } else {
      sorted.forEach(it=>{
        html+=`<div class="report-item-row">
          <span class="report-icon">${it.prio==='alta'?'🔴':it.prio==='media'?'🟡':'🟢'}</span>
          <div class="report-text">
            ${escHtml(it.desc)}
            <div class="report-time">${it.hora}</div>
          </div>
          <span class="prio-badge prio-${it.prio}">${it.prio}</span>
        </div>`;
      });
    }
    if(done.length){
      html+=`<div class="done-summary">✅ Resueltos hoy: ${done.length}</div>`;
    }
    html+=`</div>`;
  });
  if(!anyContent){
    html='<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:14px">Sin pendientes registrados.<br>Agrega pendientes durante el día.</div>';
  }
  body.innerHTML=html;
}

function copyReport(){
  const today=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let txt=`📋 REPORTE DE PENDIENTES\nReunión diaria — ${today}\n${'─'.repeat(40)}\n\n`;
  let has=false;
  AREAS.forEach(a=>{
    const its=items.filter(i=>i.area===a.id);
    if(!its.length)return;
    has=true;
    const pend=its.filter(i=>!i.done);
    const done=its.filter(i=>i.done);
    txt+=`▸ ${a.name.toUpperCase()} (${pend.length} pendiente${pend.length!==1?'s':''})\n`;
    [...pend].sort((x,y)=>{const p={alta:0,media:1,baja:2};return p[x.prio]-p[y.prio];})
      .forEach(it=>txt+=`  ${it.prio==='alta'?'🔴':it.prio==='media'?'🟡':'🟢'} [${it.prio.toUpperCase()}] ${it.desc} (${it.hora})\n`);
    if(done.length)txt+=`  ✅ Resueltos: ${done.length}\n`;
    txt+='\n';
  });
  if(!has)txt+='Sin pendientes registrados.\n';
  txt+=`${'─'.repeat(40)}\nTotal: ${items.length} | Resueltos: ${items.filter(i=>i.done).length} | Pendientes: ${items.filter(i=>!i.done).length}`;

  navigator.clipboard.writeText(txt).then(()=>{
    showToast('✓ Reporte copiado al portapapeles');
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showToast('✓ Reporte copiado');}
    catch(e){showToast('No se pudo copiar');}
    document.body.removeChild(ta);
  });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// Date
document.getElementById('fecha-chip').textContent=new Date().toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
document.getElementById('report-date-label').textContent=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

document.getElementById('inp-desc').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addItem();}
});

load();
render();
</script>
